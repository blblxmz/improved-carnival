<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>精神图景 · 锚点</title>
    <style>
        /* ========== 样式部分（与之前完全一致） ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: "Consolas", "Courier New", monospace;
            font-size: 14px;
            line-height: 1.6;
            min-height: 100vh;
            padding: 10px;
            max-width: 100vw;
            overflow-x: hidden;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .header {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }
        .header-title {
            font-size: clamp(16px, 3vw, 22px);
            color: #00d9c0;
            font-weight: bold;
        }
        .header-sub {
            font-size: clamp(10px, 1.5vw, 12px);
            color: #888;
        }
        .main-wrap {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }
        .top-function-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }
        @media (min-width: 768px) {
            .top-function-area {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 15px;
            }
            .full-width {
                grid-column: span 2;
            }
        }
        .card {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            width: 100%;
        }
        .card-title {
            font-size: clamp(12px, 1.8vw, 14px);
            color: #888;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .progress-item {
            margin-bottom: 12px;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: clamp(10px, 1.5vw, 12px);
            margin-bottom: 5px;
        }
        .progress-bar {
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-inner {
            height: 100%;
            background: #00d9c0;
            border-radius: 3px;
        }
        .sync-value {
            color: #00d9c0;
            font-weight: bold;
        }
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }
        .func-btn {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 6px;
            color: #e0e0e0;
            padding: 10px 5px;
            font-size: clamp(10px, 1.5vw, 12px);
            font-family: inherit;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            height: 60px;
            justify-content: center;
            transition: all 0.2s;
            width: 100%;
        }
        .func-btn:hover, .func-btn:active {
            background: #252525;
            border-color: #00d9c0;
        }
        .func-btn.active {
            border-color: #00d9c0;
            color: #00d9c0;
        }
        .func-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }
        .save-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }
        .save-btn {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 6px;
            color: #e0e0e0;
            padding: 8px;
            font-size: clamp(10px, 1.5vw, 12px);
            font-family: inherit;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            width: 100%;
        }
        .save-btn:hover, .save-btn:active {
            border-color: #00d9c0;
        }
        .save-btn.active {
            border-color: #00d9c0;
            color: #00d9c0;
        }
        .content-bottom {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            margin-top: 15px;
        }
        .story-box {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            min-height: 200px;
            font-size: clamp(14px, 2vw, 16px);
            line-height: 1.8;
            white-space: pre-line;
            width: 100%;
            font-family: "方正仿宋简体", "FZFS", "Georgia", serif;
        }
        .options-title {
            font-size: clamp(12px, 1.8vw, 14px);
            color: #888;
            margin-bottom: 10px;
            width: 100%;
        }
        .option-item {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            font-family: "方正小标宋简体", "FZXBS", "Times New Roman", serif;
        }
        .option-item:hover, .option-item:active {
            background: #252525;
            border-color: #555;
        }
        .option-number {
            color: #888;
            margin-right: 10px;
            flex-shrink: 0;
            font-size: clamp(12px, 1.5vw, 14px);
        }
        .option-text {
            flex: 1;
            font-size: clamp(14px, 1.8vw, 16px);
            word-wrap: break-word;
        }
        .option-sync {
            background: #222;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 3px 8px;
            font-size: clamp(10px, 1.5vw, 12px);
            color: #00d9c0;
            margin-right: 10px;
            flex-shrink: 0;
        }
        .option-sync.mental-cost {
            color: #ff6b6b;
        }
        .option-arrow {
            color: #00d9c0;
            flex-shrink: 0;
            font-size: clamp(12px, 1.5vw, 14px);
        }
        .start-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            gap: 20px;
            padding: 10px;
            width: 100%;
        }
        .view-card {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            width: clamp(280px, 80%, 400px);
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .view-card:hover, .view-card:active {
            border-color: #00d9c0;
            background: #252525;
        }
        .view-card h2 {
            font-size: clamp(16px, 2vw, 18px);
            margin-bottom: 10px;
        }
        .view-status {
            font-size: clamp(10px, 1.5vw, 12px);
            color: #888;
        }
        .view-status.completed {
            color: #00d9c0;
        }
        .game-page {
            display: none;
            width: 100%;
        }
        #game-tip {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1e1e1e;
            border: 1px solid #00d9c0;
            border-radius: 6px;
            padding: 10px 15px;
            font-size: clamp(10px, 1.5vw, 12px);
            color: #00d9c0;
            display: none;
            z-index: 1000;
            max-width: 80%;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 20px;
            overflow-y: auto;
        }
        .overlay-content {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            max-width: clamp(280px, 80%, 500px);
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .ending-box {
            background: #1e1e1e;
            border: 1px solid #00d9c0;
            border-radius: 8px;
            padding: 20px;
            margin: 15px 0;
            text-align: center;
            color: #00d9c0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="game-tip"></div>
        <div class="header">
            <div class="header-title">精神图景 · 锚点</div>
            <div class="header-sub">SENTINEL-GUIDE SYNCHRONIZATION PROTOCOL V2.4</div>
        </div>

        <!-- 开始页面 -->
        <div id="start-page" class="start-page">
            <div class="view-card" onclick="Game.startView('chengye')">
                <h2>程野 · 临海之森</h2>
                <div id="chengye-status" class="view-status">未探索</div>
            </div>
            <div class="view-card" onclick="Game.startView('jiangyanbai')">
                <h2>江砚白 · 钢铁森林</h2>
                <div id="jiangyanbai-status" class="view-status">未探索</div>
            </div>
        </div>

        <!-- 游戏主页面 -->
        <div id="game-page" class="game-page">
            <div class="main-wrap">
                <!-- 顶部功能区域 -->
                <div class="top-function-area">
                    <div class="card">
                        <div class="card-title">生理指标监控</div>
                        <div class="progress-item">
                            <div class="progress-label">
                                <span>同步率</span>
                                <span class="sync-value" id="sync-value">50%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-inner" id="sync-progress" style="width: 50%"></div>
                            </div>
                        </div>
                        <div class="progress-item">
                            <div class="progress-label">
                                <span>探索度</span>
                                <span id="explore-value">0%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-inner" id="explore-progress" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-title">物证与卷宗收集</div>
                        <div class="progress-item">
                            <div class="progress-label">
                                <span>记忆碎片</span>
                                <span id="frag-text">0 / 15</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-inner" id="frag-progress" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="progress-item">
                            <div class="progress-label">
                                <span>特殊物品</span>
                                <span id="item-text">0 / 6</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-inner" id="item-progress" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="progress-item">
                            <div class="progress-label">
                                <span>结局收集</span>
                                <span id="end-text">0 / 10</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-inner" id="end-progress" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                    <div class="card full-width">
                        <div class="card-title">功能操作</div>
                        <div class="btn-grid">
                            <button class="func-btn" onclick="UI.toggleFastForward()" id="fast-forward-btn">
                                <svg viewBox="0 0 24 24"><path d="M13 2.05v3.02c3.95.49 7 3.85 7 7.93 0 .67-.08 1.33-.24 1.96l2.95 2.95C23.62 16.66 24 14.88 24 13c0-6.18-5-11-11-11-1.84 0-3.59.31-5.15.88l2.95 2.95C11.68 4.23 12.33 4.13 13 2.05zm-2.5.69L2.05 3.05l1.41 1.41C2.19 5.16 1 7.96 1 13c0 6.18 5 11 11 11 5.04 0 7.84-1.19 8.55-2.48l1.41 1.41L21.95 21l-9.44-9.44-2.01 2.01c.56 1.18.44 2.58-.31 3.54-.89.99-2.4.99-3.29 0-.99-.89-.99-2.4 0-3.29.77-.77 1.98-.89 2.95-.31l2.01-2.01L5.11 2.74z"/></svg>
                                快进
                            </button>
                            <button class="func-btn" onclick="Game.replayNode()">
                                <svg viewBox="0 0 24 24"><path d="M13.5 3C8.04 3 3.27 6.96 1.64 12H0l2.5 2.5L5 12H3.36C5.08 7.03 9.43 3.5 14.5 3.5c4.34 0 8.04 2.84 9.27 6.68C24.61 9.5 25 11.16 25 13c0 3.31-2.69 6-6 6-1.79 0-3.4-.88-4.43-2.24L9.87 18c1.52 2.03 3.96 3.34 6.63 3.34 4.42 0 8-3.58 8-8 0-4.42-3.58-8-8-8-1.5 0-2.9.41-4.13 1.11L13.5 3z"/></svg>
                                重播
                            </button>
                            <button class="func-btn" onclick="UI.toggleBgm()" id="music-btn">
                                <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                                音乐
                            </button>
                            <button class="func-btn" onclick="UI.showTimeLine()">
                                <svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
                                回溯
                            </button>
                        </div>
                        <div class="card-title" style="margin-top: 15px;">存档管理</div>
                        <div class="save-grid">
                            <button class="save-btn" id="save-btn-0" onclick="Save.saveGame(0)">存档1</button>
                            <button class="save-btn" id="save-btn-1" onclick="Save.saveGame(1)">存档2</button>
                            <button class="save-btn" id="save-btn-2" onclick="Save.saveGame(2)">存档3</button>
                            <button class="save-btn" id="save-btn-3" onclick="Save.saveGame(3)">存档4</button>
                            <button class="save-btn" id="save-btn-4" onclick="Save.saveGame(4)">存档5</button>
                        </div>
                        <div class="save-grid">
                            <button class="save-btn" id="load-btn-0" onclick="Save.loadGame(0)">读档1</button>
                            <button class="save-btn" id="load-btn-1" onclick="Save.loadGame(1)">读档2</button>
                            <button class="save-btn" id="load-btn-2" onclick="Save.loadGame(2)">读档3</button>
                            <button class="save-btn" id="load-btn-3" onclick="Save.loadGame(3)">读档4</button>
                            <button class="save-btn" id="load-btn-4" onclick="Save.loadGame(4)">读档5</button>
                        </div>
                        <button class="func-btn" onclick="Game.backToStart()" style="width: 100%; margin-top: 10px;">
                            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                            返回首页
                        </button>
                    </div>
                </div>
                <!-- 底部文字和选项 -->
                <div class="content-bottom">
                    <div class="story-box" id="narrate-text">【请选择视角开始探索】</div>
                    <div class="options-title">> 请选择行动方案</div>
                    <div id="options-area"></div>
                </div>
            </div>
        </div>

        <!-- 时间线弹窗 -->
        <div class="overlay" id="time-line-page">
            <div class="overlay-content">
                <div class="card-title" style="color:#00d9c0; text-align:center; font-size:16px;">已访问节点（点击回溯）</div>
                <button class="save-btn" onclick="UI.hideTimeLine()" style="width:100%; margin-bottom:15px;">关闭</button>
                <div id="time-line-content"></div>
            </div>
        </div>

        <!-- 结局弹窗 -->
        <div class="overlay" id="ending-page">
            <div class="overlay-content">
                <div class="card-title" id="ending-name" style="color:#00d9c0; text-align:center; font-size:16px;">结局</div>
                <div class="ending-box" id="ending-desc"></div>
                <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px;">
                    <button class="save-btn" onclick="UI.hideEnding()">关闭</button>
                    <button class="save-btn" onclick="Game.replayEndingLine()">重玩此线</button>
                    <button class="save-btn" onclick="Game.backToStart()">返回首页</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== 所有JavaScript代码直接内嵌 ==========
        // 以下内容整合自 data.js, game.js, save.js, ui.js (最终修复版)

        // ---------- data.js ----------
        const GAME_DATA = {

                "chengye_area1_start": {
                    id: "chengye_area1_start",

                    options: [ { text: "走近歪斜的树查看", nextNode: "chengye_area1_point1" } ]

                "chengye_area1_point1": {

                    options: [
                        { text: "顺着松针散落的方向走", syncChange: 3, exploreChange: 10, hiddenPerception: "发现隐秘小径", nextNode: "chengye_area1_point3" },
                        { text: "让狼王闻松针", syncChange: 5, hiddenPerception: "江砚白最近去过山顶", nextNode: "chengye_area1_point3" },

                "chengye_area1_point4": {
                    id: "chengye_area1_point4",

                    options: [
                        { text: "走缓坡", syncChange: 2, exploreChange: 0, nextNode: "chengye_area2_start" },
                        { text: "走石阶", syncChange: 8, cost: { type: "体力" }, hiddenPerception: "江砚白常走这条路", nextNode: "chengye_area2_start" },

                "chengye_area2_start": {
                    id: "chengye_area2_start",
                    name: "山腰针叶林 · 初入",
                    text: "石阶尽头，雾气渐浓。\n\n你站在针叶林边缘。这里的树更高更密，阳光几乎透不下来。雾气在你周围流动，像有生命的东西。\n\n远处有悬崖，有深谷。你能听见山涧的水声，但看不见水在哪里。\n\n狼王变得警惕，耳朵竖起，喉咙里发出低沉的呜咽。\n\n这里对应江砚白处理过的那些复杂案件、接触过的黑暗人性。整个区域都在不稳定地颤动——有些地方的树木已经折断，悬崖边缘在崩塌。",
                    options: [ { text: "走进雾气深处", nextNode: "chengye_area2_point1" } ]
                },
                "chengye_area2_point1": {
                    id: "chengye_area2_point1",
                    name: "山腰针叶林 · 雾中的身影",
                    text: "雾气深处，有一个模糊的人影。\n\n你走近几步——那个人影也在动，像是朝你走来。但等你再靠近，它又消失了。",
                    options: [
                        { text: "启用超听觉，捕捉雾中的声音", syncChange: 10, cost: { type: "精神力", value: 10 }, hiddenPerception: "他在说话，他让你别过去", nextNode: "chengye_area2_point2" },
                        { text: "让狼王追上去", syncChange: 10, item: "染血的羽毛", nextNode: "chengye_area2_point2" },
                        { text: "用自己的精神力感知", syncChange: 8, cost: { type: "精神力", value: 15 }, hiddenPerception: "他在期待你", nextNode: "chengye_area2_point2" }
                    ]
                },
                "chengye_area2_point2": {
                    id: "chengye_area2_point2",
                    name: "山腰针叶林 · 断裂的悬崖",
                    text: "你走到一处悬崖边。边缘的岩石在崩落，一块接一块地坠入看不见的深谷。\n\n悬崖对面，隐约能看见另一片山林——那是通往山顶的路。\n\n但你过不去。中间的裂缝太宽了。",
                    options: [
                        { text: "试图跳过去", syncChange: -10, nextNode: "chengye_area2_point2" },
                        { text: "寻找其他路", syncChange: 3, exploreChange: 5, nextNode: "chengye_area2_point3" },
                        { text: "让狼王试试看", syncChange: 5, nextNode: "chengye_area2_point2_after" },
                        { text: "用自己的精神力尝试修补裂缝", syncChange: 15, cost: { type: "精神力", value: 20 }, hiddenPerception: "你稳定了这一小段悬崖", nextNode: "chengye_area2_point3" }
                    ]
                },
                "chengye_area2_point2_after": {
                    id: "chengye_area2_point2_after",
                    name: "山腰针叶林 · 狼王的鼓励",
                    text: "它跳过去了！\n\n它稳稳落在对面，然后回头看你，低吼一声。\n\n像是在说：你可以的。\n\n你看着那道裂缝，深吸一口气。\n\n它跳过去了。你也应该能。",
                    options: [ { text: "继续前进", nextNode: "chengye_area2_point3" } ]
                },
                "chengye_area2_point3": {
                    id: "chengye_area2_point3",
                    name: "山腰针叶林 · 山涧的回声",
                    text: "你循着水声找到一条山涧。水很清，但看不见底。水面上漂着几片奇怪的叶子——不是针叶林的叶子，是钢铁森林里才会有的、沾着城市灰尘的叶子。\n\n你蹲下来，伸手触碰水面。",
                    options: [
                        { text: "直接用手捧水", syncChange: 10, hiddenPerception: "他的图景里，倒映着你的树", nextNode: "chengye_area2_point4" },
                        { text: "让狼王喝水", syncChange: 8, nextNode: "chengye_area2_point4" },
                        { text: "用精神力探入水中", syncChange: 10, cost: { type: "精神力", value: 15 }, hiddenPerception: "他想走进你的图景", nextNode: "chengye_area2_point4" }
                    ]
                },
                "chengye_area2_point4": {
                    id: "chengye_area2_point4",
                    name: "山腰针叶林 · 记忆碎片",
                    text: "雾气忽然散开一角，露出一小片空地。\n\n空地上有一个透明的、漂浮的发光碎片。\n\n记忆碎片。\n\n你走过去，伸手触碰——\n\n画面闪现：\n\n审讯室。惨白的灯光。江砚白坐在桌子这一边，对面是一个罪犯。罪犯在笑，说着什么，那些话像刀子一样锋利。\n\n江砚白的表情平静。他的手放在桌上，一动不动。\n\n但你知道——你的感知告诉你——他的手在微微发抖。\n\n那是他第一次接触人性的极端黑暗。那个罪犯说的话，后来在他脑海里回响了很久很久。\n\n他用了很久才消化掉那段记忆。他一个人。\n\n碎片消散前，你感知到他的情绪：\n\n当时的恐惧。\n后来的释然。\n还有一个念头——\n\n“幸好程野不用经历这些。”\n\n你站在空地上，很久没动。",
                    options: [
                        { text: "记住这个念头", syncChange: 5, fragment: "他在黑暗里想过你", nextNode: "chengye_area2_point5" },
                        { text: "对着消散的碎片说话：“但我愿意经历你的所有。”", syncChange: 10, nextNode: "chengye_area2_point5" },
                        { text: "让狼王记住这个地方", syncChange: 5, nextNode: "chengye_area2_point5" }
                    ]
                },
                "chengye_area2_point5": {
                    id: "chengye_area2_point5",
                    name: "山腰针叶林 · 信鸽的踪迹",
                    text: "你在地上发现几片灰白色的羽毛，还有一小摊血迹。\n\n血迹。\n\n你的心猛地抽紧。",
                    options: [
                        { text: "启用超嗅觉，追踪血迹", syncChange: 8, cost: { type: "精神力", value: 10 }, hiddenPerception: "发现隐蔽山洞", nextNode: "chengye_hidden_cave" },
                        { text: "让狼王带路", syncChange: 5, nextNode: "chengye_hidden_cave" },
                        { text: "捡起羽毛，轻声呼唤", syncChange: 10, cost: { type: "精神力", value: 5 }, nextNode: "chengye_hidden_cave" }
                    ]
                },
                "chengye_hidden_cave": {
                    id: "chengye_hidden_cave",
                    name: "隐藏区域 · 山腰山洞",
                    text: "山洞不大，但很深。洞壁上有发光的苔藓，照亮了前路。\n\n你的脚步声在洞里回响，一下，一下。\n\n狼王走在你身边，安静得不像它。\n\n走到最深处——\n\n信鸽蜷缩在一块石头上，翅膀上有一道伤口，正在流血。它看见你，想飞起来，但动不了。\n\n旁边，江砚白靠坐在洞壁边，闭着眼，脸色苍白。\n\n他的精神体受伤了。他也受伤了。\n\n你的心狠狠揪了一下。",
                    options: [
                        { text: "先查看信鸽", syncChange: 15, fragment: "信鸽治愈", nextNode: "chengye_hidden_cave_dialogue" },
                        { text: "先查看江砚白", syncChange: 15, cost: { type: "精神力", value: 10 }, nextNode: "chengye_hidden_cave_dialogue" },
                        { text: "同时触碰他们两个", syncChange: 20, cost: { type: "精神力", value: 20 }, fragment: "双向治愈", nextNode: "chengye_hidden_cave_dialogue" }
                    ]
                },
                "chengye_hidden_cave_dialogue": {
                    id: "chengye_hidden_cave_dialogue",
                    name: "隐藏区域 · 山洞对话",
                    text: "江砚白睁开眼，看着你。\n\n他的眼睛里有短暂的茫然，然后渐渐聚焦。\n\n“......程野。”\n\n“嗯。”\n\n“你怎么找到这里的？”",
                    options: [
                        { text: "“跟着血迹来的。”", syncChange: 5, hiddenPerception: "你不想再看见他受伤", nextNode: "chengye_hidden_cave_after" },
                        { text: "“鸽子带我来的。”", syncChange: 8, nextNode: "chengye_hidden_cave_after" },
                        { text: "“我总能找到你。”", syncChange: 15, nextNode: "chengye_hidden_cave_after" }
                    ]
                },
                "chengye_hidden_cave_after": {
                    id: "chengye_hidden_cave_after",
                    name: "隐藏区域 · 山洞深处",
                    text: "沉默片刻。\n\n江砚白：“这里......是我藏起来的地方。”\n\n“藏什么？”\n\n他没有回答。\n\n但你懂了。\n\n藏那些不想让人看见的脆弱，藏那些独自消化的黑暗，藏那些不能说出口的情绪。\n\n藏那些——他不想让你担心，所以从来不说的事。",
                    options: [
                        { text: "不再追问，只是扶他起来", syncChange: 10, fragment: "沉默的陪伴", nextNode: "chengye_hidden_cave_exit" },
                        { text: "说：“以后可以不用藏。”", syncChange: 15, nextNode: "chengye_hidden_cave_exit" },
                        { text: "让狼王进来", syncChange: 10, nextNode: "chengye_hidden_cave_exit" }
                    ]
                },
                "chengye_hidden_cave_exit": {
                    id: "chengye_hidden_cave_exit",
                    name: "离开山洞",
                    text: "你扶着他走出山洞。\n\n外面的雾气淡了一些。信鸽飞在前面，偶尔回头看看你们。\n\n狼王走在他另一边，时不时用头蹭蹭他的腿。\n\n你感觉到他的身体不再那么紧绷了。\n\n“......程野。”\n\n“嗯？”\n\n他顿了顿，然后说：“谢谢。”\n\n你转头看他。\n\n他没看你，看着前方的路。\n\n但你知道，他是认真的。\n\n你没说话，只是扶着他的手臂，又紧了一点。",
                    options: [ { text: "继续向山顶前进", nextNode: "chengye_area3_start" } ],
                    fragment: "藏起来的地方",
                    exploreChange: 15
                },
                "chengye_area3_start": {
                    id: "chengye_area3_start",
                    name: "山顶草甸 · 初入",
                    text: "穿过山洞后方的隐秘小径，你终于抵达山顶。\n\n雾气散去，眼前豁然开朗——\n\n一片开阔的草甸，风吹过时草浪起伏。远处，是那片海。蔚蓝、辽阔、没有边际。海面上有光在跳动，像是阳光，但天空是灰白色的，这光是来自哪里？\n\n江砚白站在草甸边缘，背对着你，看着海。\n\n他的背影看起来很安静，但你知道——他的精神图景还没有完全稳定。草甸的某些地方，草在无故倒伏；远处海面上，偶尔有奇怪的波纹。",
                    options: [ { text: "走向他", nextNode: "chengye_area3_point1" } ]
                },
                "chengye_area3_point1": {
                    id: "chengye_area3_point1",
                    name: "山顶草甸 · 草甸上的痕迹",
                    text: "你走近他，但没有立刻出声。\n\n草甸上有一条被人踩过的路，从你站的地方一直延伸到江砚白站的地方。那是他平时走的路。\n\n路的两旁，有些地方的草格外茂盛，有些地方的草稀疏。",
                    options: [
                        { text: "看茂盛的草", syncChange: 8, hiddenPerception: "他在这里想过你", nextNode: "chengye_area3_point2" },
                        { text: "看稀疏的草", syncChange: 8, hiddenPerception: "他在这里独自消化黑暗", nextNode: "chengye_area3_point2" },
                        { text: "让狼王沿着路走", syncChange: 5, nextNode: "chengye_area3_point2" }
                    ]
                },
                "chengye_area3_point2": {
                    id: "chengye_area3_point2",
                    name: "山顶草甸 · 海面上的倒影",
                    text: "你走近江砚白，站在他身边，一起看着海。\n\n海面上，除了天空的倒影，还有别的——\n\n一座城市。钢铁森林。霓虹灯牌闪烁，高架桥交错。\n\n那是你的精神图景。",
                    options: [
                        { text: "指着海面：“那是......”", syncChange: 5, hiddenPerception: "他一直能看见你", nextNode: "chengye_area3_point3" },
                        { text: "沉默地看着，心跳加快", syncChange: 10, nextNode: "chengye_area3_point3" },
                        { text: "问：“你什么时候开始能看见的？”", syncChange: 12, hiddenPerception: "他从第一天就开始看着你", nextNode: "chengye_area3_point3" }
                    ]
                },
                "chengye_area3_point3": {
                    id: "chengye_area3_point3",
                    name: "山顶草甸 · 信鸽的归来",
                    text: "信鸽从远处飞来，落在江砚白肩头。它的伤已经好了，羽毛也恢复了光泽。\n\n它歪着头看你，然后飞起来，落在你肩上。\n\n江砚白侧头看着这一幕。",
                    options: [
                        { text: "伸手摸了摸信鸽", syncChange: 8, nextNode: "chengye_area3_point4" },
                        { text: "说：“它好像喜欢我。”", syncChange: 12, hiddenPerception: "他脱口而出的话", nextNode: "chengye_area3_point4" },
                        { text: "让狼王站起来", syncChange: 10, hiddenPerception: "它们比你们自在", nextNode: "chengye_area3_point4" }
                    ]
                },
                "chengye_area3_point4": {
                    id: "chengye_area3_point4",
                    name: "山顶草甸 · 风的方向",
                    text: "山顶的风一直吹着，从海面吹向陆地。\n\n但你忽然发现，有一瞬间，风向变了——从你身后吹向海面。\n\n那一缕风里，带着钢铁森林的气息：金属、混凝土、城市的烟火气。\n\n那是从你的精神图景吹来的风。",
                    options: [
                        { text: "闭上眼，感受这缕风", syncChange: 10, hiddenPerception: "你们之间有看不见的通道", nextNode: "chengye_area3_core" },
                        { text: "问江砚白：“你也能感受到吗？”", syncChange: 12, hiddenPerception: "他一直能感觉到你", nextNode: "chengye_area3_core" },
                        { text: "轻声说：“原来我们之间，一直有风。”", syncChange: 15, hiddenPerception: "风知道", nextNode: "chengye_area3_core" }
                    ]
                },
                "chengye_area3_core": {
                    id: "chengye_area3_core",
                    name: "核心场景 · 山顶对话",
                    text: "你们并肩站着，看了很久的海。\n\n最后，江砚白开口：\n\n“你是第二个来这里的人。”\n\n你侧头看他。\n\n他没看你，继续看着海：\n\n“第一个是我自己。”\n\n你的心跳漏了一拍。",
                    options: [
                        { text: "“我很荣幸。”", syncChange: 10, nextNode: "chengye_area3_core_after" },
                        { text: "沉默，等他说下去", syncChange: 15, nextNode: "chengye_area3_core_after" },
                        { text: "“那我能不能......经常来？”", syncChange: 20, nextNode: "chengye_area3_core_after" }
                    ]
                },
                "chengye_area3_core_after": {
                    id: "chengye_area3_core_after",
                    name: "核心场景 · 目光",
                    text: "江砚白转过头来看你。\n\n那一瞬间，风停了。\n\n他的眼睛里有东西在动——那是你从未见过的东西，像海面下涌动的暗流。\n\n你的喉咙发紧。你想说点什么，却发现自己的嘴唇在微微发抖。\n\n然后他移开了视线。\n\n“该出去了。”他说，声音比平时低了一点，“外面还有人在等你。”",
                    options: [
                        { text: "“好。”", syncChange: 5, nextNode: "chengye_area3_farewell" },
                        { text: "站着没动，再看了他一眼", syncChange: 10, nextNode: "chengye_area3_farewell" },
                        { text: "说：“砚白哥。”", syncChange: 15, nextNode: "chengye_area3_farewell" }
                    ]
                },
                "chengye_area3_farewell": {
                    id: "chengye_area3_farewell",
                    name: "离开前的瞬间",
                    text: "你转身，准备离开。\n\n走出两步——\n\n“阿野。”\n\n你的脚步猛地停住。\n\n那是他的声音，很轻，被风吹得有点散。\n\n你回过头。\n\n他还站在原地，背对着你，看着海。风吹起他的衣摆，信鸽落在他肩上。\n\n“下次想来看海，”他说，“不用等我被困。”\n\n你站在原地，心跳擂鼓。",
                    options: [
                        { text: "“好。”", syncChange: 10, nextNode: "chengye_ending_trigger" },
                        { text: "“我会来的。”", syncChange: 15, nextNode: "chengye_ending_trigger" },
                        { text: "走回去，站在他身边", syncChange: 20, nextNode: "chengye_ending_trigger" }
                    ]
                },
                "chengye_ending_trigger": {
                    id: "chengye_ending_trigger",
                    name: "离开",
                    text: "你退出了精神图景。\n\n最后一刻，你看见——\n\n山顶上，他一个人站着。\n\n风吹了很久。\n\n然后他伸出手，摸了摸信鸽的羽毛。\n\n轻声说了什么。\n\n被风吹散了。\n\n但你猜到了。\n\n因为你的心跳，还在为他跳着。",
                    options: [],
                    isEnding: true
                }
            },
            jiangyanbai: {
                "jiangyanbai_area1_start": {
                    id: "jiangyanbai_area1_start",
                    name: "边缘地带 · 高架桥下",
                    text: "江砚白从意识深处浮起时，发现自己站在一座城市的边缘。\n\n不是普通的城市。这里的天永远不会亮——灰蒙蒙的穹顶下，高架桥交错纵横，玻璃幕墙的大厦林立，霓虹灯牌闪烁却寂静无声。远处有废弃的工业区，生锈的管道像巨兽的骨架。\n\n程野的精神图景。钢铁森林。\n\n江砚白从来没有从'外面'看过这里。\n\n他是程野的向导，每一次精神链接都是直接进入核心区域——巨树下。他见过那棵树的每一片叶子，感受过它根系的深度。但他从未见过这座城市的全貌。\n\n原来程野的图景这么大。原来他每天穿行的世界，是这样的。\n\n风从城市深处吹来，带着金属的味道和淡淡的烟火气。不是冷的风——程野的风里，有一种很轻的温暖，像深夜亮着灯的窗户。\n\n狼王从一条巷子里走出来。\n\n它看着他，没有像平时那样直接跑过来，而是慢慢走近，在他面前停下，然后低下头，蹭了蹭他的腿。\n\n江砚白蹲下来，伸手摸了摸它的头。\n\n“他在哪？”他轻声问。\n\n狼王朝城市深处看了一眼，然后转身，走了几步，回头看他——跟上来。",
                    options: [ { text: "探索高架桥下", nextNode: "jiangyanbai_area1_point1" } ]
                },
                "jiangyanbai_area1_point1": {
                    id: "jiangyanbai_area1_point1",
                    name: "桥墩上的爪痕",
                    text: "你走近那些爪痕。很深，像是狼王在这里磨过爪子，一遍又一遍。",
                    options: [
                        { text: "伸手触碰爪痕", syncChange: 5, hiddenPerception: "狼王一直在等你", nextNode: "jiangyanbai_area1_point1_after" },
                        { text: "问狼王：“你经常在这里等？”", syncChange: 5, nextNode: "jiangyanbai_area1_point1_after" },
                        { text: "用自己的精神力感知爪痕上的残留", syncChange: 8, cost: { type: "精神力", value: 5 }, hiddenPerception: "你感知到了等待的漫长", nextNode: "jiangyanbai_area1_point1_after" }
                    ]
                },
                "jiangyanbai_area1_point1_after": {
                    id: "jiangyanbai_area1_point1_after",
                    name: "桥墩上的爪痕",
                    text: "你收回手，心口有点软。\n\n狼王一直在等你。从程野成为你哨兵的第一天起，它就在这里等。",
                    options: [ { text: "继续探索", nextNode: "jiangyanbai_area1_point2" } ]
                },
                "jiangyanbai_area1_point2": {
                    id: "jiangyanbai_area1_point2",
                    name: "第一片落叶",
                    text: "高架桥下的地面上，散落着一些东西——几片枯叶，一根羽毛，一小截被咬过的树枝。",
                    options: [
                        { text: "捡起羽毛", syncChange: 5, item: "信鸽的羽毛（来自程野的收藏）", nextNode: "jiangyanbai_area1_point3" },
                        { text: "看那截树枝", syncChange: 5, hiddenPerception: "程野的图景里有你的东西", nextNode: "jiangyanbai_area1_point3" },
                        { text: "让信鸽飞下来", syncChange: 5, nextNode: "jiangyanbai_area1_point3" }
                    ]
                },
                "jiangyanbai_area1_point3": {
                    id: "jiangyanbai_area1_point3",
                    name: "高架桥的方向",
                    text: "高架桥有两个方向。一条通向更深的城市中心，那里灯火更密；一条通向废弃厂区，那里更暗、更静。\n\n狼王站在通向城市中心的方向，回头看你。\n\n信鸽却飞向了废弃厂区，在空中盘旋。",
                    options: [
                        { text: "跟着狼王走", syncChange: 3, nextNode: "jiangyanbai_area2_start" },
                        { text: "跟着信鸽走", syncChange: 5, nextNode: "jiangyanbai_area2_start" },
                        { text: "停下来感知程野的位置", syncChange: 10, cost: { type: "精神力", value: 10 }, hiddenPerception: "程野的精神力分裂了", nextNode: "jiangyanbai_area1_point4" }
                    ]
                },
                "jiangyanbai_area1_point4": {
                    id: "jiangyanbai_area1_point4",
                    name: "城市的风",
                    text: "站在高架桥下，你感觉到风在变化。\n\n有时候，风从城市深处吹来，带着烟火气和温暖。\n\n有时候，风突然转向，从你身后吹来——那是从你精神图景吹来的风，带着海的味道和松木的清香。",
                    options: [
                        { text: "闭上眼感受风的来去", syncChange: 8, hiddenPerception: "你们之间有风", nextNode: "jiangyanbai_area1_point5" },
                        { text: "问狼王：“你能感觉到我的风吗？”", syncChange: 5, nextNode: "jiangyanbai_area1_point5" },
                        { text: "轻声说：“原来他也能感觉到我。”", syncChange: 8, hiddenPerception: "他也能感觉到你", nextNode: "jiangyanbai_area1_point5" }
                    ]
                },
                "jiangyanbai_area1_point5": {
                    id: "jiangyanbai_area1_point5",
                    name: "第一座大厦",
                    text: "高架桥尽头，第一座玻璃幕墙大厦矗立在路口。\n\n你走近时，忽然发现——玻璃幕墙上映出的不是你的脸。\n\n是画面。",
                    options: [
                        { text: "看第一块幕墙", syncChange: 5, hiddenPerception: "他看见你的温和", nextNode: "jiangyanbai_area2_start" },
                        { text: "看第二块幕墙", syncChange: 5, hiddenPerception: "他也看见你的黑暗", nextNode: "jiangyanbai_area2_start" },
                        { text: "看第三块幕墙", syncChange: 10, hiddenPerception: "他看见你最私密的地方", nextNode: "jiangyanbai_area2_start" }
                    ]
                },
                "jiangyanbai_area2_start": {
                    id: "jiangyanbai_area2_start",
                    name: "废弃厂区 · 初入",
                    text: "穿过高架桥，你来到一片废弃的工业区。\n\n生锈的管道像巨蟒一样盘在地上，倒塌的厂房墙壁上爬满了藤蔓，但藤蔓是灰色的——这里没有生命应有的绿色。\n\n这里对应程野执行过的案件，那些无法磨灭的记忆。\n\n每一座废弃的厂房，都是一段他无法忘记的过去。\n\n狼王变得安静了，走在你身边，偶尔用头蹭蹭你的腿——像是在安慰你，也像是在提醒你：这里对他来说，不轻松。",
                    options: [ { text: "探索第一座厂房", nextNode: "jiangyanbai_area2_point1" } ]
                },
                "jiangyanbai_area2_point1": {
                    id: "jiangyanbai_area2_point1",
                    name: "第一座厂房",
                    text: "你推开生锈的铁门，走进去。\n\n厂房里空荡荡的，只有一些废弃的机械。但墙上有东西——一幅幅画面，像投影一样在墙上播放。\n\n第一幅画面：\n\n程野第一次出任务。很年轻，眼神里还有警校生的青涩。他在追一个人，跑得很快。最后追上了，但那人回头时，手里有刀。程野躲开了，刀锋擦过他脸侧——没有伤到，只差一点。",
                    options: [
                        { text: "伸手触碰画面", syncChange: 8, fragment: "第一次任务", hiddenPerception: "他那时候就在想你", nextNode: "jiangyanbai_area2_point2" },
                        { text: "只是看着，不动", syncChange: 5, nextNode: "jiangyanbai_area2_point2" },
                        { text: "问狼王：“他当时回来怎么说的？”", syncChange: 5, hiddenPerception: "他什么都没说", nextNode: "jiangyanbai_area2_point2" }
                    ]
                },
                "jiangyanbai_area2_point2": {
                    id: "jiangyanbai_area2_point2",
                    name: "第二座厂房",
                    text: "第二座厂房更大，墙上也有画面。\n\n程野和几个队友一起追捕嫌犯。嫌犯跑进一栋楼，程野第一个冲进去。楼里很黑，他打开手电，一点一点搜索。忽然有人从暗处冲出来——程野反应很快，躲开了，但队友在后面。他一把推开队友，自己撞在墙上。\n\n画面里，他撞得很重，但站起来时只是揉了揉肩膀，继续追。",
                    options: [
                        { text: "感知他的情绪", syncChange: 5, fragment: "推开队友", hiddenPerception: "他总是在保护别人", nextNode: "jiangyanbai_area2_point3" },
                        { text: "注意到一个细节", syncChange: 8, hiddenPerception: "他撞墙时在想你", nextNode: "jiangyanbai_area2_point3" },
                        { text: "问狼王：“他后来去医务室了吗？”", syncChange: 3, nextNode: "jiangyanbai_area2_point3" }
                    ]
                },
                "jiangyanbai_area2_point3": {
                    id: "jiangyanbai_area2_point3",
                    name: "管道迷宫",
                    text: "厂区深处，是一片生锈的管道迷宫。管道纵横交错，有些地方很低，需要弯腰才能通过。\n\n狼王朝一个方向跑去，很快消失在管道间。\n\n你等了等，它没回来。",
                    options: [
                        { text: "跟着狼王的方向走", syncChange: 5, nextNode: "jiangyanbai_hidden_pipe" },
                        { text: "释放信鸽探路", syncChange: 5, nextNode: "jiangyanbai_hidden_pipe" },
                        { text: "用自己的精神力感知", syncChange: 10, cost: { type: "精神力", value: 10 }, nextNode: "jiangyanbai_hidden_pipe" }
                    ]
                },
                "jiangyanbai_hidden_pipe": {
                    id: "jiangyanbai_hidden_pipe",
                    name: "隐藏区域 · 管道空间",
                    text: "你走进那个小空间。\n\n狼王在这里。它卧在地上，头枕着前爪。\n\n旁边，有一小块空地，地上铺着一些干草和羽毛——是狼王给自己做的窝。\n\n但它很少睡在这里。因为这里，是程野每次任务后来'消化'情绪的地方。\n\n你感知到的疲惫和委屈，就是他从这里留下的。",
                    options: [
                        { text: "伸手触碰那些干草", syncChange: 10, hiddenPerception: "他在这里消化不能说的事", nextNode: "jiangyanbai_area2_point4" },
                        { text: "捡起一根羽毛", syncChange: 10, item: "隐藏的羽毛", nextNode: "jiangyanbai_area2_point4" },
                        { text: "只是看着，不说话", syncChange: 5, nextNode: "jiangyanbai_area2_point4" }
                    ]
                },
                "jiangyanbai_area2_point4": {
                    id: "jiangyanbai_area2_point4",
                    name: "生锈的楼梯",
                    text: "厂区最深处，有一架生锈的楼梯，通向一个高处的平台。\n\n楼梯看起来很危险，有些踏板已经锈穿了。\n\n狼王在楼梯下停下来，抬头看着上面，然后回头看你——它想上去，但它在等你决定。",
                    options: [
                        { text: "试着走上去", syncChange: 5, nextNode: "jiangyanbai_hidden_platform" },
                        { text: "让信鸽先飞上去看看", syncChange: 3, nextNode: "jiangyanbai_hidden_platform" },
                        { text: "用精神力感知上面", syncChange: 5, cost: { type: "精神力", value: 5 }, nextNode: "jiangyanbai_hidden_platform" }
                    ]
                },
                "jiangyanbai_hidden_platform": {
                    id: "jiangyanbai_hidden_platform",
                    name: "隐藏区域 · 平台上的收藏盒",
                    text: "你爬上平台，走到铁箱子前。\n\n打开箱子——\n\n里面放着一些东西：\n\n· 几片灰白色的羽毛，是你的信鸽的\n· 一张便签，上面是你的笔迹，写着某次案件的分析\n· 一小截松枝，从你图景里飘来的\n· 一块石头，很普通，但上面刻着一个字：'白'",
                    options: [
                        { text: "拿起羽毛", syncChange: 10, hiddenPerception: "他从第一天就在收集你的东西", nextNode: "jiangyanbai_area2_point5" },
                        { text: "看那张便签", syncChange: 10, fragment: "那次案件", nextNode: "jiangyanbai_area2_point5" },
                        { text: "拿起那块石头", syncChange: 15, hiddenPerception: "他一直想让你来", nextNode: "jiangyanbai_area2_point5" }
                    ]
                },
                "jiangyanbai_area2_point5": {
                    id: "jiangyanbai_area2_point5",
                    name: "第三座厂房",
                    text: "第三座厂房最小，也最偏僻。\n\n门半开着。\n\n你推门进去——\n\n里面只有一个画面，在墙上静静地播放：\n\n程野受了伤，坐在医务室里。医生在给他包扎，他低着头，看不见表情。\n\n门开了。你走进来。\n\n画面里的程野抬起头，看见你的一瞬间，他的眼神变了——从忍着疼的倔强，变成了一种很轻的、几乎看不出来的放松。\n\n你走过去，在他身边坐下，什么都没说，只是陪着他。\n\n画面定格在这个瞬间。",
                    options: [
                        { text: "看着那个瞬间", syncChange: 10, fragment: "你在的时候", nextNode: "jiangyanbai_area3_start" },
                        { text: "伸手触碰画面里的他", syncChange: 12, hiddenPerception: "你来了，他就安心了", nextNode: "jiangyanbai_area3_start" },
                        { text: "只是站着，不说话", syncChange: 8, nextNode: "jiangyanbai_area3_start" }
                    ]
                },
                "jiangyanbai_area3_start": {
                    id: "jiangyanbai_area3_start",
                    name: "核心空地 · 巨树下",
                    text: "穿过废弃厂区，眼前豁然开朗。\n\n一片被钢铁森林包围的空地。四周是高楼大厦，但中间有一片开阔地，地上是柔软的草地——这是整座钢铁森林里，唯一有绿色的地方。\n\n中央，一棵巨树。\n\n树冠遮天蔽日，根系深深扎进混凝土之下。树干很粗，要几个人才能合抱。\n\n狼王走到树下，卧下。\n\n程野靠在树干上，闭着眼。\n\n他蜷缩着，像一个在等什么人的孩子。",
                    options: [ { text: "走近他", nextNode: "jiangyanbai_area3_point1" } ]
                },
                "jiangyanbai_area3_point1": {
                    id: "jiangyanbai_area3_point1",
                    name: "走近他",
                    text: "你走过去，在他面前蹲下。\n\n他闭着眼，眉头轻轻皱着。呼吸很平稳，但嘴唇抿得很紧——即使在睡梦中，他也在忍着什么。\n\n你伸出手，想帮他梳理一下那些乱成一团的感知——\n\n指尖刚触到他额头的瞬间，他动了动。\n\n“砚白哥......”他轻声呢喃。\n\n你的手顿住了。\n\n他没醒，只是下意识地叫了你的名字。",
                    options: [
                        { text: "继续梳理", syncChange: 10, cost: { type: "精神力", value: 5 }, nextNode: "jiangyanbai_area3_point2" },
                        { text: "收回手，只是看着他", syncChange: 5, nextNode: "jiangyanbai_area3_point2" },
                        { text: "轻声回应：“我在。”", syncChange: 12, nextNode: "jiangyanbai_area3_point2" }
                    ]
                },
                "jiangyanbai_area3_point2": {
                    id: "jiangyanbai_area3_point2",
                    name: "树下的痕迹",
                    text: "你环顾四周。巨树下有很多痕迹——狼王卧过的地方，磨过爪子的树根，还有......\n\n一些你不认识的东西。",
                    options: [
                        { text: "树根上的刻痕", syncChange: 10, hiddenPerception: "他记住了每一个日子", nextNode: "jiangyanbai_area3_point3" },
                        { text: "树下的一小堆石头", syncChange: 10, hiddenPerception: "他把你的名字刻在石头上", nextNode: "jiangyanbai_area3_point3" },
                        { text: "树洞里藏着的东西", syncChange: 0, nextNode: "jiangyanbai_hidden_letters" }
                    ]
                },
                "jiangyanbai_hidden_letters": {
                    id: "jiangyanbai_hidden_letters",
                    name: "隐藏区域 · 树洞里的信",
                    text: "树干上有一个洞，不大，但足够伸手进去。\n\n你犹豫了一下，然后伸手。\n\n摸到一个小盒子。\n\n拿出来，打开——\n\n盒子里是信。\n\n很多封，叠得整整齐齐。\n\n最上面一封的日期是今天。\n\n你打开，上面只有一行字：\n\n“砚白哥今天没来。他是不是累了？”\n\n你的心口一紧。\n\n你翻看下一封：\n\n“砚白哥帮我梳理的时候，手很轻。他知不知道我喜欢他？”\n\n再下一封：\n\n“今天差点说漏嘴了。还好他转头了。”\n\n再下一封：\n\n“我想让他来看我的树。但不知道怎么开口。”\n\n一封一封，全是这样的句子。\n\n从来没寄出去的信。从来没说过的话。\n\n你一封一封看下去：\n\n第一年：“今天第一次见他。他穿灰色毛衣。我想记住他。”\n\n第二年：“他记得我的名字。他叫我程野。就两个字，我高兴了一整天。”\n\n第三年：“他成了哥哥的搭档。我能经常看见他了。我是不是应该满足了？但我还想更多。”\n\n第四年：“今天他问我，程野，你是不是累了？他看出来了。他看出来了！”\n\n第五年：“我成为他哨兵了。以后能天天见到他。我要控制住自己，不能让他发现。”\n\n第六年：“控制不住了。我好想告诉他。但不行。说了他会躲吗？他会不会觉得我烦？”\n\n第七年：“今天又写了一封。第一百三十七封了。一封都没寄出去。”\n\n第八年：“他在我精神图景里的时候，我的树会高兴。他走了，树就蔫几天。树都知道我喜欢他，就他不知道。”\n\n第九年：“今天差点说了。真的只差一点点。但他转头了。他是不是故意的？他是不是知道，所以假装没听见？”\n\n第十年：“砚白哥今天没来。他是不是累了？”\n\n信到这里结束。\n\n你捧着那些信，很久很久。\n\n十年。他写了十年。\n\n从第一次见到你那天开始，一直写到现在。",
                    options: [ { text: "放下信，看着他", syncChange: 30, item: "程野的信", nextNode: "jiangyanbai_area3_point3" } ]
                },
                "jiangyanbai_area3_point3": {
                    id: "jiangyanbai_area3_point3",
                    name: "狼王和信鸽",
                    text: "狼王还卧在那里，看着你。\n\n信鸽从你肩头飞下来，落在狼王背上。\n\n两个精神体就这样待着，一个灰白色的狼，一只灰白色的鸽子。",
                    options: [
                        { text: "轻声说：“你们倒是比我们自在。”", syncChange: 5, nextNode: "jiangyanbai_area3_point4" },
                        { text: "走过去，在狼王身边坐下", syncChange: 8, nextNode: "jiangyanbai_area3_point4" },
                        { text: "什么都不说，只是看着", syncChange: 5, nextNode: "jiangyanbai_area3_point4" }
                    ]
                },
                "jiangyanbai_area3_point4": {
                    id: "jiangyanbai_area3_point4",
                    name: "树上的叶子",
                    text: "巨树上，有些叶子的颜色不太一样。\n\n你仔细看——那些叶子，不是这棵树的叶子。是针叶，是松叶，是从你图景里飘来的叶子，落在了他的树上。\n\n它们被小心地夹在枝桠间，没有掉落。",
                    options: [
                        { text: "伸手触碰那些叶子", syncChange: 10, hiddenPerception: "他留着你的一切", nextNode: "jiangyanbai_area3_core" },
                        { text: "问狼王：“他一直留着？”", syncChange: 8, nextNode: "jiangyanbai_area3_core" },
                        { text: "轻声说：“原来你收着。”", syncChange: 12, hiddenPerception: "你们一样", nextNode: "jiangyanbai_area3_core" }
                    ]
                },
                "jiangyanbai_area3_core": {
                    id: "jiangyanbai_area3_core",
                    name: "核心场景 · 巨树下的对话",
                    text: "你在他身边坐下来，背靠着树干。\n\n狼王卧在你另一边，信鸽在你肩上。\n\n风从城市深处吹来，带着烟火气。\n\n过了很久，他动了动。\n\n然后他睁开眼，看着你。\n\n他的眼睛里有短暂的茫然，然后渐渐聚焦。\n\n“......江砚白？”\n\n“嗯。”\n\n“你怎么进来的？”",
                    options: [
                        { text: "“你叫我进来的。”", syncChange: 10, nextNode: "jiangyanbai_area3_core_branch1" },
                        { text: "“我不进来，谁进来？”", syncChange: 12, nextNode: "jiangyanbai_area3_core_branch2" },
                        { text: "沉默片刻，然后说：“我担心你。”", syncChange: 15, nextNode: "jiangyanbai_area3_core_branch3" }
                    ]
                },
                "jiangyanbai_area3_core_branch1": {
                    id: "jiangyanbai_area3_core_branch1",
                    name: "核心对话 · 你叫我进来的",
                    text: "他愣了一下。\n\n然后他想起——梦里喊过你的名字。很多次。\n\n他垂下眼，耳朵尖有点红。\n\n你没说话，只是看着他。",
                    options: [ { text: "继续", nextNode: "jiangyanbai_area3_core_continue" } ]
                },
                "jiangyanbai_area3_core_branch2": {
                    id: "jiangyanbai_area3_core_branch2",
                    name: "核心对话 · 我不进来谁进来",
                    text: "他垂下眼，没说话。\n\n但你知道他在想什么——他在想“你怎么每次都来”。\n\n你每次都来。每次他需要的时候，你都在。\n\n你不知道怎么解释。你只是......会来。",

                }
                if (option.fragment) {
                    if (!this.state.collectedFragments.includes(option.fragment)) {
                        this.state.collectedFragments.push(option.fragment);
                        UI.showTip(`获得记忆碎片：${option.fragment}`);
                    }
                }
                if (option.item) {
                    if (!this.state.collectedItems.includes(option.item)) {
                        this.state.collectedItems.push(option.item);
                        UI.showTip(`获得特殊物品：${option.item}`);
                    }
                }
                this.recordVisitedNode(nodeId, currentSync);
                if (option.nextNode && option.nextNode.includes('ending')) {
                    this.triggerEnding(option.nextNode);
                    return;
                }
                if (option.nextNode) {
                    this.state.currentNode = option.nextNode;
                    UI.renderScene(this.state.currentNode);
                }
                UI.updateProgress();
            },
            recordVisitedNode: function(nodeId, syncAtNode) {
                const scene = GAME_DATA[this.state.currentView][nodeId];
                if (!scene) return;
                const exists = this.state.visitedNodes.some(n => n.nodeId === nodeId);
                if (!exists) {
                    this.state.visitedNodes.push({
                        nodeId: nodeId,
                        nodeName: scene.name || nodeId,
                        sync: syncAtNode !== undefined ? syncAtNode : this.state.sync,
                        time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
                    });
                }
            },
            backToNode: function(nodeId) {
                const record = this.state.visitedNodes.find(n => n.nodeId === nodeId);
                if (!record) return;
                this.state.sync = record.sync;
                this.state.currentNode = nodeId;
                UI.renderScene(nodeId);
                UI.showTip(`已回溯到：${record.nodeName}`);
                UI.updateProgress();
            },
            replayNode: function() {
                UI.renderScene(this.state.currentNode);
                UI.showTip('重播当前节点');
            },
            triggerEnding: function(endingId) {
                let finalEndingId = endingId;
                if (endingId === 'chengye_ending_trigger') {
                    if (this.state.sync < 40) finalEndingId = 'ending_chengye_01';
                    else if (this.state.sync < 60) finalEndingId = 'ending_chengye_02';
                    else if (this.state.sync < 80) finalEndingId = 'ending_chengye_03';
                    else if (this.state.sync < 95) finalEndingId = 'ending_chengye_04';
                    else finalEndingId = 'ending_chengye_05';
                } else if (endingId === 'jiangyanbai_ending_trigger') {
                    if (this.state.sync < 40) finalEndingId = 'ending_jiang_01';
                    else if (this.state.sync < 60) finalEndingId = 'ending_jiang_02';
                    else if (this.state.sync < 80) finalEndingId = 'ending_jiang_03';
                    else if (this.state.sync < 95) finalEndingId = 'ending_jiang_04';
                    else finalEndingId = 'ending_jiang_05';
                }
                if (!this.state.unlockedEndings.includes(finalEndingId)) {
                    this.state.unlockedEndings.push(finalEndingId);
                    localStorage.setItem('unlocked_endings', JSON.stringify(this.state.unlockedEndings));
                    if (this.state.currentView === 'chengye') {
                        localStorage.setItem('chengye_explored', 'true');
                    } else if (this.state.currentView === 'jiangyanbai') {
                        localStorage.setItem('jiangyanbai_explored', 'true');
                    }
                    this.checkHiddenEnding();
                }
                UI.showEnding(finalEndingId);
            },
            checkHiddenEnding: function() {
                const chengyeExplored = localStorage.getItem('chengye_explored') === 'true';
                const jiangyanbaiExplored = localStorage.getItem('jiangyanbai_explored') === 'true';
                const allFragments = this.state.collectedFragments.length >= 15;
                const allItems = this.state.collectedItems.length >= 6;
                if (chengyeExplored && jiangyanbaiExplored && allFragments && allItems) {
                    if (!this.state.unlockedEndings.includes('ending_hidden')) {
                        this.state.unlockedEndings.push('ending_hidden');
                        localStorage.setItem('unlocked_endings', JSON.stringify(this.state.unlockedEndings));
                        UI.showTip('✨ 解锁隐藏结局：风知道，海知道，树也知道');
                    }
                }
            },
            replayEndingLine: function() {
                this.state.currentNode = this.state.currentView === 'chengye' ? 'chengye_area1_start' : 'jiangyanbai_area1_start';
                this.state.sync = 50;
                this.state.explore = 0;
                UI.hideEnding();
                UI.renderScene(this.state.currentNode);
                UI.updateProgress();
                UI.showTip('重新开始当前视角');
            },
            backToStart: function() {
                UI.hideEnding();
                UI.updateViewStatus();
                document.getElementById('game-page').style.display = 'none';
                document.getElementById('start-page').style.display = 'flex';
                UI.showTip('返回视角选择页面');
            },
            getState: function() {
                return {
                    currentView: this.state.currentView,
                    currentNode: this.state.currentNode,
                    sync: this.state.sync,
                    explore: this.state.explore,
                    visitedNodes: this.state.visitedNodes,
                    collectedFragments: this.state.collectedFragments,
                    collectedItems: this.state.collectedItems,
                    unlockedEndings: this.state.unlockedEndings
                };
            },
            setState: function(state) {
                this.state = { ...this.state, ...state };
                if (this.state.currentNode) {
                    UI.renderScene(this.state.currentNode);
                }
                UI.updateProgress();
                UI.showTip('读档完成');
            }
        };

        // ---------- save.js ----------
        const Save = {
            saveGame: function(slot) {
                if (slot < 0 || slot > 4) return;
                const state = Game.getState();
                state.saveTime = new Date().toLocaleString('zh-CN');
                localStorage.setItem(`game_save_${slot}`, JSON.stringify(state));
                this.updateAllButtons();
                UI.showTip(`已存档到槽位 ${slot + 1}`);
            },
            loadGame: function(slot) {
                if (slot < 0 || slot > 4) return;
                const saveData = localStorage.getItem(`game_save_${slot}`);
                if (!saveData) {
                    UI.showTip(`槽位 ${slot + 1} 无存档`);
                    return;
                }
                try {
                    const state = JSON.parse(saveData);
                    Game.setState(state);
                    document.getElementById('start-page').style.display = 'none';
                    document.getElementById('game-page').style.display = 'block';
                    this.updateAllButtons();
                    UI.showTip(`从槽位 ${slot + 1} 读档成功`);
                } catch (e) {
                    console.error('读档失败', e);
                    UI.showTip('读档失败，存档可能已损坏');
                }
            },
            updateAllButtons: function() {
                for (let i = 0; i < 5; i++) {
                    const saveBtn = document.getElementById(`save-btn-${i}`);
                    const loadBtn = document.getElementById(`load-btn-${i}`);
                    const hasSave = localStorage.getItem(`game_save_${i}`);
                    if (saveBtn) {
                        if (hasSave) {
                            saveBtn.classList.add('active');
                        } else {
                            saveBtn.classList.remove('active');
                        }
                    }
                    if (loadBtn) {
                        if (hasSave) {
                            loadBtn.classList.add('active');
                        } else {
                            loadBtn.classList.remove('active');
                        }
                    }
                }
            },
            deleteSave: function(slot) {
                if (slot < 0 || slot > 4) return;
                localStorage.removeItem(`game_save_${slot}`);
                this.updateAllButtons();
                UI.showTip(`已删除槽位 ${slot + 1} 的存档`);
            },
            getAllSaves: function() {
                const saves = [];
                for (let i = 0; i < 5; i++) {
                    const data = localStorage.getItem(`game_save_${i}`);
                    if (data) {
                        try {
                            saves.push({
                                slot: i,
                                data: JSON.parse(data)
                            });
                        } catch (e) {
                            saves.push({
                                slot: i,
                                data: null
                            });
                        }
                    }
                }
                return saves;
            },
            init: function() {
                this.updateAllButtons();
            }
        };

        // ---------- ui.js ----------
        const UI = {
            typeTimer: null,
            showTip: function(text) {
                const tip = document.getElementById("game-tip");
                tip.textContent = `> ${text}`;
                tip.style.display = "block";
                setTimeout(() => {
                    tip.style.display = "none";
                }, 2500);
            },
            updateProgress: function() {
                const state = Game.state;
                document.getElementById("sync-value").innerText = `${state.sync}%`;
                document.getElementById("sync-progress").style.width = `${state.sync}%`;
                document.getElementById("explore-value").innerText = `${state.explore}%`;
                document.getElementById("explore-progress").style.width = `${state.explore}%`;
                const fragCount = state.collectedFragments.length;
                document.getElementById("frag-text").innerText = `${fragCount} / 15`;
                document.getElementById("frag-progress").style.width = `${(fragCount/15)*100}%`;
                const itemCount = state.collectedItems.length;
                document.getElementById("item-text").innerText = `${itemCount} / 6`;
                document.getElementById("item-progress").style.width = `${(itemCount/6)*100}%`;
                const endCount = state.unlockedEndings.length;
                document.getElementById("end-text").innerText = `${endCount} / 10`;
                document.getElementById("end-progress").style.width = `${(endCount/10)*100}%`;
            },
            updateViewStatus: function() {
                const chengyeExplored = localStorage.getItem("chengye_explored") === "true";
                const jiangyanbaiExplored = localStorage.getItem("jiangyanbai_explored") === "true";
                const chengyeEl = document.getElementById("chengye-status");
                const jiangEl = document.getElementById("jiangyanbai-status");
                if (chengyeExplored) {
                    chengyeEl.innerText = "已探索";
                    chengyeEl.classList.add("completed");
                }
                if (jiangyanbaiExplored) {
                    jiangEl.innerText = "已探索";
                    jiangEl.classList.add("completed");
                }
            },
            typeText: function(element, text, speed = 30, callback) {
                if (this.typeTimer) {
                    clearInterval(this.typeTimer);
                }
                element.innerText = '';
                let index = 0;
                if (Game.state.isFastForward) {
                    element.innerText = text;
                    if (callback) callback();
                    return;
                }
                this.typeTimer = setInterval(() => {
                    if (index < text.length) {
                        element.innerText += text[index];
                        index++;
                    } else {
                        clearInterval(this.typeTimer);
                        if (callback) callback();
                    }
                }, speed);
            },
            renderScene: function(nodeId) {
                if (!Game.state.currentView) return;
                const scene = GAME_DATA[Game.state.currentView][nodeId];
                if (!scene) {
                    console.error('场景不存在', nodeId);
                    return;
                }
                const narrateEl = document.getElementById("narrate-text");
                this.typeText(narrateEl, scene.text, 30);
                const optionsArea = document.getElementById("options-area");
                optionsArea.innerHTML = "";
                if (scene.options && scene.options.length > 0) {
                    scene.options.forEach((option, index) => {
                        const optionEl = document.createElement("div");
                        optionEl.className = "option-item";
                        optionEl.onclick = function() {
                            Game.selectOption(nodeId, index);
                        };
                        let optionContent = `
                            <span class="option-number">${String.fromCharCode(65 + index)}</span>
                            <span class="option-text">${option.text}</span>
                        `;
                        if (option.syncChange) {
                            const syncText = option.syncChange >= 0 ? `+${option.syncChange}` : option.syncChange;
                            optionContent += `<span class="option-sync">同步率 ${syncText}</span>`;
                        }
                        if (option.cost) {
                            const costText = option.cost.type === "精神力" ? `精神-${option.cost.value}` : "体力消耗";
                            optionContent += `<span class="option-sync mental-cost">${costText}</span>`;
                        }
                        optionContent += `<span class="option-arrow">></span>`;
                        optionEl.innerHTML = optionContent;
                        optionsArea.appendChild(optionEl);
                    });
                } else {
                    optionsArea.innerHTML = `
                        <div class="option-item" style="cursor: default; opacity: 0.6;">
                            <span class="option-number">✓</span>
                            <span class="option-text">剧情已结束</span>
                            <span class="option-arrow">></span>
                        </div>
                    `;
                }
                const titleEl = document.querySelector(".options-title");
                if (titleEl && scene.name) {
                    titleEl.innerHTML = `> ${scene.name}`;
                }
                this.updateProgress();
            },
            replayNode: function() {
                if (!Game.state.currentNode) return;
                const scene = GAME_DATA[Game.state.currentView][Game.state.currentNode];
                if (!scene) return;
                const narrateEl = document.getElementById("narrate-text");
                this.typeText(narrateEl, scene.text, 30);
                this.showTip("重播当前节点");
            },
            showTimeLine: function() {
                const timelineContent = document.getElementById("time-line-content");
                timelineContent.innerHTML = "";
                if (Game.state.visitedNodes.length === 0) {
                    timelineContent.innerHTML = '<div style="color:#888; text-align:center; padding:20px;">暂无访问记录</div>';
                } else {
                    const reversedNodes = [...Game.state.visitedNodes].reverse();
                    reversedNodes.forEach((node) => {
                        const nodeEl = document.createElement("div");
                        nodeEl.style.cssText = `
                            background: #1e1e1e;
                            border: 1px solid #333;
                            border-radius: 6px;
                            padding: 12px;
                            margin-bottom: 8px;
                            cursor: pointer;
                        `;
                        nodeEl.onclick = function() {
                            Game.backToNode(node.nodeId);
                            UI.hideTimeLine();
                        };
                        nodeEl.innerHTML = `
                            <div style="display:flex; justify-content:space-between; color:#00d9c0; font-size:12px; margin-bottom:5px;">
                                <span>${node.time || '--:--'}</span>
                                <span>同步率 ${node.sync}%</span>
                            </div>
                            <div style="color:#e0e0e0; font-size:14px;">${node.nodeName}</div>
                        `;
                        timelineContent.appendChild(nodeEl);
                    });
                }
                document.getElementById("time-line-page").style.display = "flex";
            },
            hideTimeLine: function() {
                document.getElementById("time-line-page").style.display = "none";
            },
            showEnding: function(endId) {
                let endingData;
                if (ENDINGS.chengye && ENDINGS.chengye[endId]) {
                    endingData = ENDINGS.chengye[endId];
                } else if (ENDINGS.jiangyanbai && ENDINGS.jiangyanbai[endId]) {
                    endingData = ENDINGS.jiangyanbai[endId];
                } else if (ENDINGS.hidden && ENDINGS.hidden[endId]) {
                    endingData = ENDINGS.hidden[endId];
                }
                if (!endingData) {
                    console.error('结局数据未找到:', endId);
                    this.showTip(`结局数据加载失败 (${endId})`);
                    return;
                }
                document.getElementById("ending-name").innerText = `结局：${endingData.name}`;
                const endingDesc = document.getElementById("ending-desc");
                this.typeText(endingDesc, endingData.desc, 20);
                document.getElementById("ending-page").style.display = "flex";
                this.showTip(`解锁结局：${endingData.name}`);
                this.updateProgress();
            },
            hideEnding: function() {
                if (this.typeTimer) {
                    clearInterval(this.typeTimer);
                }
                document.getElementById("ending-page").style.display = "none";
            },
            toggleFastForward: function() {
                Game.state.isFastForward = !Game.state.isFastForward;
                const btn = document.getElementById("fast-forward-btn");
                if (Game.state.isFastForward) {
                    btn.classList.add('active');
                    if (this.typeTimer) {
                        clearInterval(this.typeTimer);
                        const narrateEl = document.getElementById("narrate-text");
                        const scene = GAME_DATA[Game.state.currentView][Game.state.currentNode];
                        if (scene) {
                            narrateEl.innerText = scene.text;
                        }
                    }
                } else {
                    btn.classList.remove('active');
                }
                this.showTip(Game.state.isFastForward ? "快进模式开启" : "快进模式关闭");
            },
            toggleBgm: function() {
                Game.state.bgmEnabled = !Game.state.bgmEnabled;
                const btn = document.getElementById("music-btn");
                if (Game.state.bgmEnabled) {
                    if (!window.bgmPlayer) {
                        window.bgmPlayer = new Audio('music/bgm.mp3');
                        window.bgmPlayer.loop = true;
                    }
                    window.bgmPlayer.play().catch(() => {
                        this.showTip("请先点击页面任意位置开启音乐");
                        Game.state.bgmEnabled = false;
                        return;
                    });
                    btn.classList.add('active');
                } else {
                    if (window.bgmPlayer) {
                        window.bgmPlayer.pause();
                    }
                    btn.classList.remove('active');
                }
                this.showTip(Game.state.bgmEnabled ? "音乐开启" : "音乐关闭");
            },
            init: function() {
                this.updateViewStatus();
                this.updateProgress();
                window.toggleFastForward = this.toggleFastForward.bind(this);
                window.toggleBgm = this.toggleBgm.bind(this);
                window.showTimeLine = this.showTimeLine.bind(this);
                window.hideTimeLine = this.hideTimeLine.bind(this);
                window.hideEnding = this.hideEnding.bind(this);
                window.replayNode = this.replayNode.bind(this);
            }
        };

        // 页面加载初始化
        window.addEventListener('load', function() {
            Save.init();
            Game.init();
            UI.init();
        });
    </script>
</body>
</html>
